<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Available Time Slots</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
                     'Helvetica Neue', Arial, sans-serif;
        line-height: 1.6; color: #333; background: #f5f5f5; padding: 20px;
    }
    .container {
        max-width: 900px; margin: 0 auto; background: white;
        border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        overflow: hidden;
    }
    header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white; padding: 30px; text-align: center;
    }
    header h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
    header p  { opacity: 0.9; font-size: 14px; }
    header a  { color: white; }
    .events   { padding: 20px; }
    .week-group  { margin-bottom: 30px; }
    .week-header {
        font-size: 14px; font-weight: 600; color: #666;
        text-transform: uppercase; letter-spacing: 0.5px;
        margin-bottom: 12px; padding-bottom: 8px;
        border-bottom: 2px solid #e0e0e0;
    }
    .event {
        background: white; border-left: 4px solid #667eea; padding: 16px;
        margin-bottom: 12px; border-radius: 6px; transition: all 0.2s;
        border: 1px solid #e0e0e0;
    }
    .event:hover {
        border-left-color: #764ba2;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        transform: translateX(4px);
    }
    .event-date {
        font-weight: 600; color: #333; font-size: 16px;
        margin-bottom: 12px; padding-bottom: 8px;
        border-bottom: 1px solid #f0f0f0;
    }
    .event-time {
        color: #666; font-size: 14px; padding: 8px 0;
        display: flex; align-items: center; justify-content: space-between;
    }
    .event-time:not(:last-child) { border-bottom: 1px dashed #e8e8e8; }
    .time-range { flex: 1; }
    .event-duration {
        display: inline-block; background: #e8eaf6; color: #667eea;
        padding: 2px 8px; border-radius: 4px; font-size: 12px;
        font-weight: 600; margin-left: 8px;
    }
    .no-events {
        text-align: center; padding: 60px 20px; color: #999;
    }
    footer {
        text-align: center; padding: 20px; color: #999;
        font-size: 12px; border-top: 1px solid #e0e0e0;
    }
    @media (max-width: 600px) { header h1 { font-size: 24px; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Available Time Slots</h1>
            <p><strong><a href="https://example.org/agenda.ics">iCal file</a> - <a href="https://example.org/visio">Visio link</a></strong></p>
        </header>
        <div class="events">
            <div class="week-group">
                <div class="week-header">Week of June 29, 2026</div>
                <div class="event">
                    <div class="event-date">Thursday, July 02</div>
                    <div class="event-time">
                        <span class="time-range">14:10 - 17:00</span>
                        <span class="event-duration">2h50m</span>
                    </div>
                </div>
                <div class="event">
                    <div class="event-date">Friday, July 03</div>
                    <div class="event-time">
                        <span class="time-range">13:30 - 14:50</span>
                        <span class="event-duration">1h20m</span>
                    </div>
                    <div class="event-time">
                        <span class="time-range">16:10 - 17:00</span>
                        <span class="event-duration">50min</span>
                    </div>
                </div>
            </div>
            <div class="week-group">
                <div class="week-header">Week of July 06, 2026</div>
                <div class="event">
                    <div class="event-date">Tuesday, July 07</div>
                    <div class="event-time">
                        <span class="time-range">13:30 - 14:50</span>
                        <span class="event-duration">1h20m</span>
                    </div>
                    <div class="event-time">
                        <span class="time-range">15:50 - 17:00</span>
                        <span class="event-duration">1h10m</span>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            Generated on 2026-06-30 at 15:28
        </footer>
    </div>
</body>
</html>
